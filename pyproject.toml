[project]
name = "gpt-taxonomy"
version = "0.1.0"
description = "CLI tool for generating hierarchical category taxonomies using DeepSeek"
requires-python = ">=3.11"
readme = "README.md"
license = {file = "LICENSE"}
authors = [{name = "AutoGenerated"}]
dependencies = [
    "typer[all]>=0.9",
    "httpx>=0.27",
    "python-dotenv>=1.0",
    "pyyaml>=6.0",
    "pymorphy2>=0.9",
    "razdel>=0.5",
    "rapidfuzz>=3.0",
    "tenacity>=8.0",
    "tqdm>=4.66"
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4",
    "pytest-asyncio>=0.21",
    "black>=23.0",
    "ruff>=0.1.5",
    "mypy>=1.6"
]

[project.scripts]
gpt-taxonomy = "src.cli:app"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
extend-select = ["I"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
strict = false

